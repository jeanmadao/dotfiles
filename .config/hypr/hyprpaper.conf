preload = ~/Pictures/Wallpapers/116028081_p0.jpg
#if more than one preload is desired then continue to preload other backgrounds
preload = ~/Pictures/Wallpapers/112577117_p0.jpg
preload = ~/Pictures/Wallpapers/114310694_p0.jpg
# .. more preloads

#set the default wallpaper(s) seen on initial workspace(s) --depending on the number of monitors used
# wallpaper = DP-1,~/Pictures/Wallpapers/112577117_p0.jpg
wallpaper = HDMI-A-1,~/Pictures/Wallpapers/116028081_p0.jpg
#if more than one monitor in use, can load a 2nd image
wallpaper = DP-1,~/Pictures/Wallpapers/114310694_p0.jpg
# .. more monitors

#enable splash text rendering over the wallpaper
splash = true

#fully disable ipc
# ipc = off

